# Team override for bmad-code-review — COMMITTED (client tracks this repo).
#
# Purpose: after a code review completes and sprint status is synced,
# auto commit-and-push the docs so the client watching this repo sees the
# story move past review (toward done) live.
#
# Merge semantics (see _bmad/scripts/resolve_customization.py):
#   scalars override • arrays append. Layers on the skill's DO-NOT-EDIT
# customize.toml. Committed + pushed to the client — nothing secret here.

[workflow]

# Fires at the final step, after review findings are presented and the
# sprint status is synced. Commits the BMad docs and pushes.
on_complete = """
Publish the completed code review to the client-facing docs repo.

1. Stage only the BMad docs surface (never the whole working tree):
   `git add _bmad-output/`
2. If `git diff --cached --quiet` reports NO staged changes, skip the
   rest silently — there is nothing to publish.
3. Otherwise commit:
   `git commit -m "docs(sprint): code review complete for {{story_key}}"`
   (fall back to "docs(sprint): code review complete" if the story key is
   not available in context.)
4. Push to the branch the client tracks:
   `git push` (use `git push -u origin HEAD` if no upstream is set).
5. If push fails (no network / no remote / rejected), report the failure
   in one line and CONTINUE — do not HALT and do not retry in a loop.
   The local commit is preserved either way.

Only ever `git add _bmad-output/`. Never `git add -A` or `git add .` —
review only touches docs status; source is committed by its own flow.
"""

# 2026-07-21: 15-5-capture-code-driven-hybrid-sandbox-llm-usage moved to review (dev-story). Architect (Winston) re-scoped enforcement from a runtime-observed→adapter trigger to a DECLARED manifest capability routed through the existing malformed-manifest→propose_adapter flow (declare-and-route — the boring, paved road; the runtime-observed model fought the otherwise-entirely-staging-time subsystem). Implemented: CodeDrivenUsage model + optional `usage` field on CodeDrivenResultEnvelope; run_code_driven_hybrid threads envelope.usage → top-level result_metadata token keys (ONLY the reserved field, never the skill's domain canonical payload) → priced via existing compute_cost_usd ($1.3776 verified for the real job); `reports_usage: bool` on CodeDrivenHybridManifest — OMITTED routes to AI-assist (author forgot), `false` = honest no-LLM ($0-code), `true` = registers; synthesized manifest guaranteed to declare reports_usage on both synthesis paths (else approved bundle loops back to malformed). Real skill velara-protocol-extractor OUT of scope (operator re-uploads post-merge to get adapted). 12 new tests; blast radius = 34 integration fixtures needed reports_usage (fixed at shared fixtures). Gates: full suite 1507 passed / 1 pre-existing flake (test_repeated_denials_are_deduped) / 3 skipped; ruff clean; no api-spec diff. Backend + contract only; no migration, no FE, no new audit event. Not committed to velara-api (subrepo).
# 2026-07-21: NEW STORY 15-5 drafted (code-driven hybrid sandbox LLM usage) + INTERIM write-path fix applied. Live-test finding: a real velara-protocol-extractor (code_driven_hybrid) job reported cost $0.00 for a ~$1.38 run. Root cause = a 3rd LLM-using runtime Epic 15's investigation missed: code_driven_hybrid makes its LLM calls INSIDE the sandbox; the executor builds result_metadata from CodeDrivenResultEnvelope which has NO usage field (code_driven_executor.py:707-719), so _extract_cost_fields saw no top-level tokens → mis-classified it as a free code run → stored cost_usd=Decimal("0"). The skill DOES report tokens/est_cost but buried in its DOMAIN canonical payload (one skill's private, un-validated convention — reading it would re-arm the bug for future skills). INTERIM FIX (execution_tasks.py, NOT a story): _LLM_USING_RUNTIMES={prompt,hybrid,code_driven_hybrid}; an LLM-using runtime with no reported usage now stores cost_usd=NULL ("unknown"), never a lying $0 — genuine code runs still $0. +1 test (test_cost_null_not_zero_for_llm_runtime_missing_usage). Gates: ruff clean, execution_tasks+pricing 22/22 in-container after api+worker rebuild. PROPER FIX = Story 15-5 (draft): first-class envelope `usage` field + thread to write-path pricing seam + missing-usage = AI-Adapter trigger (runtime-observed enforcement, since the static entrypoint contract only checks INPUT signature, not return shape). Also backfilled the user's live job 49ea9ab2 to true $1.38 (local DB only). Not committed to velara-api (subrepo).
# 2026-07-21: FOLLOW-UP to 15.2 local-test finding (touches DONE story 15.1's pricing code). A real prompt job showed cost "—": root cause was app/core/pricing.py listing ONLY claude-opus-4-8, but local ANTHROPIC_MODEL=claude-haiku-4-5 → compute_cost_usd returned None (unknown model, by design) → cost_usd=NULL. FIX: expanded _MODEL_PRICING to the full current Anthropic lineup (Opus 4.5-4.8, Sonnet 5/4.5/4.6, Haiku 4.5/3.5, Fable/Mythos 5) at published standard base rates (rate card 2026-07-21), keyed by API model id. Also fixed the latent Decimal(str(float)) drift (ledger RESOLVED): rates now built via exact Decimal(x)/Decimal(1_000_000); analytics_service float-casts at use. Re-verified Numeric(12,6) still holds (cheapest rate Haiku-3.5 $0.80/MTok=8e-7/token rounds to 6dp floor, never zero). +2 pricing tests (full-lineup coverage + exactness regression). Gates: ruff clean; pricing+analytics+execution_tasks 51/51 pass in-container after api+worker rebuild. NOTE: no backfill — pre-existing NULL rows (incl. the user's Haiku job) stay "—"; only NEW jobs price. Not committed to velara-api (subrepo; per never-push-subrepos).
